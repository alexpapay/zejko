server {
    listen 80;
    listen [::]:80;

    server_name manastirica.i-feature.net;

    root /var/www/manastirica;
    index index.html;

    access_log /var/log/nginx/manastirica.access.log;
    error_log /var/log/nginx/manastirica.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
